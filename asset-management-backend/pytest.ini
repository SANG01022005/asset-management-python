[pytest]
pythonpath   = .
testpaths    = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=20

markers =
    asyncio: marks tests as async (handled by pytest-asyncio)
    slow: marks tests that hit real network / DB (skip with -m "not slow")