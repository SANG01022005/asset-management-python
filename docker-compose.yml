# docker-compose.yml — Asset Management (db + backend + frontend)

name: asset-management

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: asset_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-asset_db}
      POSTGRES_USER:     ${POSTGRES_USER:-asset_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asset_user} -d ${POSTGRES_DB:-asset_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./asset-management-backend
      dockerfile: Dockerfile
    container_name: asset_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-asset_user}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-asset_db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./asset-management-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: asset_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"      # Next.js standalone chạy port 3000
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
    driver: local