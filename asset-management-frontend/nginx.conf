# asset-management-frontend/nginx.conf
#
# Responsibilities:
#   1. Serve React SPA (handle client-side routing with try_files)
#   2. Proxy /api/* → backend:8080  (avoids CORS entirely in production)

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── 1. API proxy → backend container ──────────────────────────────────────
    # Frontend calls /api/assets, Nginx rewrites to http://backend:8080/assets
    # "backend" resolves via Docker internal DNS (service name in compose)
    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # allow long-running scan jobs
    }

    # ── 2. React SPA — client-side routing support ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 3. Cache static assets aggressively ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── 4. Health endpoint for Docker healthcheck ─────────────────────────────
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}